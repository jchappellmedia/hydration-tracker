<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1729" />
  <title>CCAT Prep — Practice the Criteria Cognitive Aptitude Test</title>
  <meta name="description" content="A free, comprehensive CCAT practice platform: full 50-question timed simulations, verbal / math / spatial drills, instant explanations, study guide, and progress tracking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />

<body>
  <header class="topbar">
    <div class="brand" id="brand-home" style="cursor:pointer">
      <span class="logo">C</span>
      <span>CCAT Prep<small>Cognitive Aptitude Trainer</small></span>
    </div>
    <nav class="nav">
      <button data-nav="home" class="active"><span class="label">Home</span></button>
      <button data-nav="study"><span class="label">Study Guide</span></button>
      <button data-nav="progress"><span class="label">Progress</span></button>
      <button class="icon-btn" id="theme-btn" title="Toggle theme">☀️</button>
    </nav>
  </header>

  <main>
    <section id="view-home"    class="view"></section>
    <section id="view-category" class="view hidden"></section>
    <section id="view-drill"   class="view hidden"></section>
    <section id="view-quiz"    class="view hidden"></section>
    <section id="view-results" class="view hidden"></section>
    <section id="view-review"  class="view hidden"></section>
    <section id="view-study"   class="view hidden"></section>
    <section id="view-progress" class="view hidden"></section>
  </main>

  <footer>
    Built for focused CCAT preparation · All progress is stored privately in your browser ·
    <a href="https://www.criteriacorp.com/" target="_blank" rel="noopener">About the official test ↗</a>
  </footer>

  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>

</html>
