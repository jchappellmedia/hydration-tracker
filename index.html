<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f80b8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Hydration &amp; Food Log</title>
  <meta name="description" content="A simple shared log for tracking fluids and food intake." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#eaf6ff; --card:#fff; --ink:#1f3242; --muted:#5d7080;
      --blue:#2f80b8; --blue2:#4aa3df; --teal:#37b9a0; --line:#e2edf4;
      --shadow:0 6px 22px rgba(47,128,184,.12);
      --safe-b:env(safe-area-inset-bottom,0px);
      --safe-t:env(safe-area-inset-top,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{-webkit-text-size-adjust:100%}
    body{
      font-family:"Nunito",-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--ink);line-height:1.45;
      overscroll-behavior-y:none;
      padding-bottom:calc(96px + var(--safe-b));
    }
    /* prevent iOS zoom-on-focus: inputs must be >=16px */
    input,select,textarea,button{font:inherit;font-size:16px}

    /* ---- App bar ---- */
    .appbar{
      position:sticky;top:0;z-index:30;
      background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);
      color:#fff;padding:calc(12px + var(--safe-t)) 16px 14px;
      box-shadow:0 4px 16px rgba(47,128,184,.25);
    }
    .appbar h1{font-size:1.25rem;font-weight:800;display:flex;align-items:center;gap:.4rem}
    .appbar .stats{display:flex;gap:.6rem;margin-top:.7rem}
    .chip-stat{flex:1;background:rgba(255,255,255,.18);border-radius:14px;padding:.55rem .6rem;text-align:center;backdrop-filter:blur(4px)}
    .chip-stat b{display:block;font-size:1.35rem;line-height:1.1}
    .chip-stat span{font-size:.72rem;font-weight:700;opacity:.92;text-transform:uppercase;letter-spacing:.03em}

    /* ---- Daily goal + progress ---- */
    .goalwrap{margin-top:.8rem}
    .goalrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-weight:800;font-size:.9rem}
    .goalrow .gedit{background:rgba(255,255,255,.2);border:0;color:#fff;font-weight:800;border-radius:999px;padding:6px 12px;min-height:34px;cursor:pointer}
    .goalbar{height:16px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden}
    .goalfill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#bff3e6,#37b9a0);transition:width .5s ease}
    .goalfill.met{background:linear-gradient(90deg,#ffe08a,#ffc857)}
    .goalmsg{text-align:center;font-weight:800;font-size:.82rem;margin-top:6px;min-height:1em}
    .goaledit{display:flex;gap:8px;align-items:center;margin-top:8px;background:rgba(255,255,255,.15);padding:8px;border-radius:14px}
    .goaledit input{flex:1;min-height:46px;border:0;border-radius:10px;padding:10px;color:var(--ink)}
    .goaledit .gsave{background:var(--teal);color:#fff;border:0;border-radius:10px;font-weight:800;min-height:46px;padding:0 16px;cursor:pointer}
    .goaledit .gcancel{background:rgba(255,255,255,.25);color:#fff;border:0;border-radius:10px;font-weight:800;min-height:46px;padding:0 14px;cursor:pointer}
    [hidden]{display:none!important}

    /* ---- Tabs ---- */
    .tabs{position:sticky;top:0;z-index:25;display:flex;background:var(--card);box-shadow:var(--shadow)}
    .tabs button{flex:1;border:0;background:none;padding:14px 0;font-weight:800;color:var(--muted);position:relative;min-height:52px;cursor:pointer}
    .tabs button.active{color:var(--blue)}
    .tabs button.active::after{content:"";position:absolute;left:18%;right:18%;bottom:0;height:3px;border-radius:3px 3px 0 0;background:var(--blue)}

    .view{display:none;padding:16px}
    .view.active{display:block;animation:fade .25s ease}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    .card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}

    label{display:block;font-weight:800;font-size:.95rem;margin:14px 0 6px}
    label:first-child{margin-top:0}
    input,select,textarea{
      width:100%;padding:14px;border:2px solid var(--line);border-radius:14px;
      background:#fbfdff;color:var(--ink);min-height:52px
    }
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue2);background:#fff}
    textarea{resize:vertical;min-height:60px}

    /* big segmented type picker */
    .types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .types button{
      border:2px solid var(--line);background:#fbfdff;border-radius:16px;
      padding:14px 4px;font-weight:800;color:var(--muted);cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:4px;min-height:74px;font-size:.85rem
    }
    .types button .e{font-size:1.7rem}
    .types button.active{background:var(--blue);border-color:var(--blue);color:#fff}

    /* quick amount chips */
    .quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .quick button{
      border:2px solid var(--line);background:#fbfdff;border-radius:999px;
      padding:10px 16px;font-weight:800;color:var(--blue);cursor:pointer;min-height:44px
    }
    .quick button:active{background:var(--blue);color:#fff}

    .now-btn{margin-top:8px;border:2px dashed var(--blue2);background:#f0f8ff;color:var(--blue);
      border-radius:12px;padding:10px;font-weight:800;width:100%;min-height:44px;cursor:pointer}

    .msg{text-align:center;font-weight:800;margin-top:10px;min-height:1.2em}
    .msg.ok{color:var(--teal)} .msg.err{color:#e0506b}

    /* sticky save bar */
    .savebar{
      position:fixed;left:0;right:0;bottom:0;z-index:40;
      padding:10px 16px calc(10px + var(--safe-b));
      background:linear-gradient(180deg,rgba(234,246,255,0) ,var(--bg) 30%);
    }
    .save{
      width:100%;border:0;border-radius:16px;background:var(--teal);color:#fff;
      font-weight:800;font-size:1.15rem;min-height:58px;cursor:pointer;
      box-shadow:0 8px 20px rgba(55,185,160,.4)
    }
    .save:active{transform:translateY(1px)}
    .save:disabled{opacity:.6}
    .savebar.hidden{display:none}

    /* history */
    .log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .log-head h2{font-size:1.05rem}
    .refresh{background:none;border:0;color:var(--blue);font-weight:800;cursor:pointer;min-height:44px;padding:0 8px}
    .day-label{font-weight:800;color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 6px}
    .entry{display:flex;gap:12px;align-items:center;background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
    .entry .ico{font-size:1.7rem}
    .entry .main{flex:1;min-width:0}
    .entry .desc{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .entry .when{font-size:.82rem;color:var(--muted);font-weight:700}
    .entry .amt{font-weight:800;color:var(--blue);white-space:nowrap;font-size:1.05rem}
    .entry .acts{display:flex;gap:6px;flex-shrink:0}
    .entry .acts button{border:0;background:#f0f6fb;border-radius:12px;width:40px;height:40px;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
    .entry .acts button:active{background:#dceaf5}
    .entry .acts .del:active{background:#fbdfe4}
    .empty{text-align:center;color:var(--muted);padding:28px 14px;font-weight:700}
    footer{text-align:center;color:var(--muted);font-size:.78rem;padding:10px 16px 0;font-weight:700}

    /* ---- Edit modal ---- */
    .modal{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;
      background:rgba(31,50,66,.45);padding:0}
    .modal[hidden]{display:none!important}
    .sheet{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;
      box-shadow:0 -8px 30px rgba(47,128,184,.25);padding:18px 16px calc(18px + var(--safe-b));
      max-height:92vh;overflow-y:auto;animation:slideup .25s ease}
    @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
    .sheet h2{font-size:1.1rem;margin-bottom:4px}
    .sheet .modal-actions{display:flex;gap:8px;margin-top:18px}
    .sheet .modal-actions button{flex:1;border:0;border-radius:14px;font-weight:800;min-height:54px;cursor:pointer;font-size:1.05rem}
    .sheet .m-save{background:var(--teal);color:#fff;box-shadow:0 6px 16px rgba(55,185,160,.35)}
    .sheet .m-save:active{transform:translateY(1px)}
    .sheet .m-save:disabled{opacity:.6}
    .sheet .m-cancel{background:#eef4f9;color:var(--muted);flex:0 0 96px}
    .sheet .m-delete{background:#fdeef1;color:#e0506b;width:100%;border:0;border-radius:14px;font-weight:800;
      min-height:50px;margin-top:10px;cursor:pointer}
    .sheet .m-delete:active{background:#f9dbe1}
    .modal-msg{text-align:center;font-weight:800;margin-top:10px;min-height:1.2em;color:#e0506b}
  </style>
</head>
<body>
  <div class="appbar">
    <h1>💧 Hydration &amp; Food Log</h1>
    <div class="stats">
      <div class="chip-stat"><b id="todayOz">–</b><span>fl oz today</span></div>
      <div class="chip-stat"><b id="todayCount">–</b><span>entries today</span></div>
    </div>

    <div class="goalwrap">
      <div class="goalrow">
        <span id="goalLabel">🎯 Goal: – oz/day</span>
        <button type="button" class="gedit" id="goalEditBtn">✏️ Edit goal</button>
      </div>
      <div class="goalbar"><div class="goalfill" id="goalFill"></div></div>
      <div class="goalmsg" id="goalMsg"></div>
      <div class="goaledit" id="goalEditBox" hidden>
        <input type="number" id="goalInput" min="1" step="1" inputmode="numeric" placeholder="oz per day" />
        <button type="button" class="gsave" id="goalSaveBtn">Save</button>
        <button type="button" class="gcancel" id="goalCancelBtn">✕</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button id="tabAdd" class="active">➕ Add</button>
    <button id="tabHistory">📋 History</button>
  </div>

  <!-- ADD VIEW -->
  <section class="view active" id="viewAdd">
    <form id="entryForm">
      <div class="card">
        <label>What was given?</label>
        <div class="types" id="typeSeg">
          <button type="button" data-type="water" class="active"><span class="e">💧</span>Water</button>
          <button type="button" data-type="food"><span class="e">🍎</span>Food</button>
          <button type="button" data-type="other"><span class="e">📝</span>Other</button>
        </div>

        <label for="amount" id="amountLabel">Amount (fl oz)</label>
        <input type="number" id="amount" step="0.1" min="0" inputmode="decimal" placeholder="e.g. 4" />
        <div class="quick" id="quickAmt">
          <button type="button" data-oz="1">1 oz</button>
          <button type="button" data-oz="2">2 oz</button>
          <button type="button" data-oz="4">4 oz</button>
          <button type="button" data-oz="6">6 oz</button>
          <button type="button" data-oz="8">8 oz</button>
        </div>

        <label for="description">Description</label>
        <input type="text" id="description" placeholder="e.g. Pedialyte, ice chips, apple" autocomplete="off" />

        <label for="when">When</label>
        <input type="datetime-local" id="when" required />
        <button type="button" class="now-btn" id="nowBtn">⏱ Set to now</button>

        <label for="loggedBy">Your name (optional)</label>
        <input type="text" id="loggedBy" placeholder="e.g. Mom, Dad, Grandma" autocomplete="name" />
      </div>
      <div class="msg" id="msg"></div>
    </form>
  </section>

  <!-- HISTORY VIEW -->
  <section class="view" id="viewHistory">
    <div class="log-head">
      <h2>📋 Full history</h2>
      <button class="refresh" id="refreshBtn" type="button">↻ Refresh</button>
    </div>
    <div id="log"><div class="empty">Loading…</div></div>
    <footer>Saved to a shared database · works on any phone or computer.</footer>
  </section>

  <!-- sticky save (only on Add view) -->
  <div class="savebar" id="savebar">
    <button type="submit" form="entryForm" class="save" id="saveBtn">Save entry ✓</button>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal" id="editModal" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <h2 id="editTitle">✏️ Edit entry</h2>
      <input type="hidden" id="editId" />

      <label>What was given?</label>
      <div class="types" id="editTypeSeg">
        <button type="button" data-type="water"><span class="e">💧</span>Water</button>
        <button type="button" data-type="food"><span class="e">🍎</span>Food</button>
        <button type="button" data-type="other"><span class="e">📝</span>Other</button>
      </div>

      <label for="editAmount" id="editAmountLabel">Amount (fl oz)</label>
      <input type="number" id="editAmount" step="0.1" min="0" inputmode="decimal" placeholder="e.g. 4" />

      <label for="editDescription">Description</label>
      <input type="text" id="editDescription" placeholder="e.g. Pedialyte, ice chips, apple" autocomplete="off" />

      <label for="editWhen">When</label>
      <input type="datetime-local" id="editWhen" />

      <label for="editLoggedBy">Logged by (optional)</label>
      <input type="text" id="editLoggedBy" placeholder="e.g. Mom, Dad, Grandma" autocomplete="name" />

      <div class="modal-msg" id="editMsg"></div>

      <div class="modal-actions">
        <button type="button" class="m-cancel" id="editCancelBtn">Cancel</button>
        <button type="button" class="m-save" id="editSaveBtn">Save changes ✓</button>
      </div>
      <button type="button" class="m-delete" id="editDeleteBtn">🗑 Delete this entry</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://utupgcayrwocavdmhyle.supabase.co";
    const SUPABASE_KEY = "sb_publishable_dfuSJkpp1yZy5yg4tlKsGw_ync0kLXy";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const $ = (id) => document.getElementById(id);
    let intakeType = "water";
    let dailyGoal = 32;
    let todayTotalOz = 0;
    let editType = "water";
    const entriesById = {};

    async function loadGoal(){
      const { data, error } = await db.from("app_settings").select("daily_goal_oz").eq("id",1).maybeSingle();
      if(!error && data && data.daily_goal_oz!=null){ dailyGoal = Number(data.daily_goal_oz); }
      renderProgress();
    }

    function renderProgress(){
      const goal = dailyGoal > 0 ? dailyGoal : 0;
      const oz = todayTotalOz;
      $("goalLabel").textContent = `🎯 Goal: ${goal} oz/day`;
      const pct = goal > 0 ? Math.min(100, Math.round((oz/goal)*100)) : 0;
      const fill = $("goalFill");
      fill.style.width = pct + "%";
      const met = goal > 0 && oz >= goal;
      fill.classList.toggle("met", met);
      if(goal <= 0){ $("goalMsg").textContent = "Set a daily goal to track progress."; }
      else if(met){ $("goalMsg").textContent = `🎉 Goal met! ${Math.round(oz*10)/10} of ${goal} oz`; }
      else { $("goalMsg").textContent = `${Math.round(oz*10)/10} of ${goal} oz · ${pct}% · ${Math.round((goal-oz)*10)/10} oz to go`; }
    }

    // Goal editing
    $("goalEditBtn").addEventListener("click", ()=>{
      $("goalInput").value = dailyGoal;
      $("goalEditBox").hidden = false;
      $("goalInput").focus();
    });
    $("goalCancelBtn").addEventListener("click", ()=>{ $("goalEditBox").hidden = true; });
    $("goalSaveBtn").addEventListener("click", async ()=>{
      const v = Number($("goalInput").value);
      if(!v || v <= 0){ $("goalInput").focus(); return; }
      $("goalSaveBtn").disabled = true; $("goalSaveBtn").textContent = "…";
      const { error } = await db.from("app_settings")
        .upsert({ id:1, daily_goal_oz:v, updated_at:new Date().toISOString() });
      $("goalSaveBtn").disabled = false; $("goalSaveBtn").textContent = "Save";
      if(!error){ dailyGoal = v; $("goalEditBox").hidden = true; renderProgress(); }
      else { $("goalMsg").textContent = "Couldn't save goal: " + error.message; }
    });

    function nowLocal(){
      const d = new Date(); const off = d.getTimezoneOffset();
      return new Date(d.getTime() - off*60000).toISOString().slice(0,16);
    }
    $("when").value = nowLocal();
    $("nowBtn").addEventListener("click", ()=> $("when").value = nowLocal());

    // Tabs
    function showTab(which){
      const add = which==="add";
      $("tabAdd").classList.toggle("active", add);
      $("tabHistory").classList.toggle("active", !add);
      $("viewAdd").classList.toggle("active", add);
      $("viewHistory").classList.toggle("active", !add);
      $("savebar").classList.toggle("hidden", !add);
      window.scrollTo({top:0});
      if(!add) load();
    }
    $("tabAdd").addEventListener("click", ()=>showTab("add"));
    $("tabHistory").addEventListener("click", ()=>showTab("history"));

    // Type picker
    $("typeSeg").addEventListener("click", (e)=>{
      const b = e.target.closest("button"); if(!b) return;
      intakeType = b.dataset.type;
      [...$("typeSeg").children].forEach(x=>x.classList.toggle("active", x===b));
      $("amountLabel").textContent = intakeType==="food" ? "Amount (optional)" : "Amount (fl oz)";
      $("quickAmt").style.display = intakeType==="food" ? "none" : "flex";
    });

    // Quick amounts
    $("quickAmt").addEventListener("click",(e)=>{
      const b = e.target.closest("button"); if(!b) return;
      $("amount").value = b.dataset.oz;
    });

    const ICON = { water:"💧", food:"🍎", other:"📝" };
    function fmtTime(iso){ return new Date(iso).toLocaleString([], {hour:"numeric", minute:"2-digit"}); }
    function dayKey(iso){ const d=new Date(iso); return d.toLocaleDateString([], {weekday:"long", month:"short", day:"numeric"}); }
    function isToday(iso){ const d=new Date(iso), n=new Date(); return d.toDateString()===n.toDateString(); }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

    async function load(){
      const { data, error } = await db.from("hydration_log")
        .select("*").order("occurred_at", { ascending:false }).limit(500);
      if(error){ $("log").innerHTML = '<div class="empty">Could not load. '+escapeHtml(error.message)+'</div>'; return; }
      if(!data.length){ $("log").innerHTML = '<div class="empty">No entries yet — add the first one. 💛</div>'; }
      else {
        for(const k in entriesById) delete entriesById[k];
        let html="", curDay=null;
        for(const r of data){
          entriesById[r.id] = r;
          const dk = isToday(r.occurred_at) ? "Today" : dayKey(r.occurred_at);
          if(dk!==curDay){ curDay=dk; html += `<div class="day-label">${dk}</div>`; }
          const amt = r.amount_oz!=null ? `${r.amount_oz} oz` : (r.amount_text||"");
          const by = r.logged_by ? ` · ${escapeHtml(r.logged_by)}` : "";
          html += `<div class="entry">
            <div class="ico">${ICON[r.intake_type]||"📝"}</div>
            <div class="main">
              <div class="desc">${escapeHtml(r.description||r.intake_type)}</div>
              <div class="when">${fmtTime(r.occurred_at)}${by}</div>
            </div>
            <div class="amt">${escapeHtml(amt)}</div>
            <div class="acts">
              <button type="button" class="edit" data-id="${r.id}" aria-label="Edit entry">✏️</button>
              <button type="button" class="del" data-id="${r.id}" aria-label="Delete entry">🗑</button>
            </div>
          </div>`;
        }
        $("log").innerHTML = html;
      }
      const today = data.filter(r=>isToday(r.occurred_at));
      const oz = today.reduce((s,r)=> s + (Number(r.amount_oz)||0), 0);
      todayTotalOz = oz;
      $("todayOz").textContent = Math.round(oz*10)/10;
      $("todayCount").textContent = today.length;
      renderProgress();
    }

    $("entryForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const msg = $("msg"); msg.className="msg"; msg.textContent="";
      const whenVal = $("when").value;
      if(!whenVal){ msg.className="msg err"; msg.textContent="Please pick a date & time."; return; }
      const amountNum = $("amount").value!=="" ? Number($("amount").value) : null;
      const row = {
        occurred_at: new Date(whenVal).toISOString(),
        intake_type: intakeType,
        description: $("description").value.trim() || null,
        amount_oz: intakeType==="food" ? null : amountNum,
        amount_text: intakeType==="food" && $("amount").value!=="" ? $("amount").value + " oz" : null,
        logged_by: $("loggedBy").value.trim() || null
      };
      $("saveBtn").disabled = true; $("saveBtn").textContent = "Saving…";
      const { error } = await db.from("hydration_log").insert(row);
      $("saveBtn").disabled = false; $("saveBtn").textContent = "Save entry ✓";
      if(error){ msg.className="msg err"; msg.textContent="Error: "+error.message; return; }
      msg.className="msg ok"; msg.textContent="Saved! ✓  Switch to History to view.";
      $("description").value=""; $("amount").value=""; $("when").value = nowLocal();
      if(navigator.vibrate) navigator.vibrate(30);
      load();
      setTimeout(()=>{ msg.textContent=""; }, 3000);
    });

    // ---- Edit / delete from history ----
    function toLocalInput(iso){
      const d = new Date(iso); const off = d.getTimezoneOffset();
      return new Date(d.getTime() - off*60000).toISOString().slice(0,16);
    }
    function setEditType(t){
      editType = t;
      [...$("editTypeSeg").children].forEach(x=>x.classList.toggle("active", x.dataset.type===t));
      $("editAmountLabel").textContent = t==="food" ? "Amount (optional)" : "Amount (fl oz)";
    }
    function openEdit(id){
      const r = entriesById[id];
      if(!r) return;
      $("editMsg").textContent = "";
      $("editId").value = r.id;
      setEditType(r.intake_type || "other");
      // amount: numeric column, or parse leading number out of amount_text (e.g. "4 oz")
      let amt = r.amount_oz!=null ? r.amount_oz : (r.amount_text!=null ? parseFloat(r.amount_text) : "");
      $("editAmount").value = (amt===""||Number.isNaN(amt)) ? "" : amt;
      $("editDescription").value = r.description || "";
      $("editWhen").value = toLocalInput(r.occurred_at);
      $("editLoggedBy").value = r.logged_by || "";
      $("editModal").hidden = false;
      document.body.style.overflow = "hidden";
    }
    function closeEdit(){
      $("editModal").hidden = true;
      document.body.style.overflow = "";
    }

    // delegate clicks on history entries
    $("log").addEventListener("click", (e)=>{
      const btn = e.target.closest("button.edit, button.del");
      if(!btn) return;
      const id = btn.dataset.id;
      if(btn.classList.contains("edit")){ openEdit(id); return; }
      // delete
      const r = entriesById[id];
      const what = r && r.description ? `"${r.description}"` : "this entry";
      if(!confirm(`Delete ${what}? This can't be undone.`)) return;
      deleteEntry(id, btn);
    });

    async function deleteEntry(id, btn){
      if(btn){ btn.disabled = true; btn.textContent = "…"; }
      const { error } = await db.from("hydration_log").delete().eq("id", id);
      if(error){
        if(btn){ btn.disabled = false; btn.textContent = "🗑"; }
        alert("Couldn't delete: " + error.message);
        return;
      }
      if(navigator.vibrate) navigator.vibrate(30);
      delete entriesById[id];
      load();
    }

    $("editTypeSeg").addEventListener("click", (e)=>{
      const b = e.target.closest("button"); if(!b) return;
      setEditType(b.dataset.type);
    });
    $("editCancelBtn").addEventListener("click", closeEdit);
    $("editModal").addEventListener("click", (e)=>{ if(e.target===$("editModal")) closeEdit(); });

    $("editDeleteBtn").addEventListener("click", ()=>{
      const id = $("editId").value;
      const r = entriesById[id];
      const what = r && r.description ? `"${r.description}"` : "this entry";
      if(!confirm(`Delete ${what}? This can't be undone.`)) return;
      $("editDeleteBtn").disabled = true; $("editDeleteBtn").textContent = "Deleting…";
      db.from("hydration_log").delete().eq("id", id).then(({error})=>{
        $("editDeleteBtn").disabled = false; $("editDeleteBtn").textContent = "🗑 Delete this entry";
        if(error){ $("editMsg").textContent = "Couldn't delete: " + error.message; return; }
        if(navigator.vibrate) navigator.vibrate(30);
        delete entriesById[id];
        closeEdit();
        load();
      });
    });

    $("editSaveBtn").addEventListener("click", async ()=>{
      const id = $("editId").value;
      $("editMsg").textContent = "";
      const whenVal = $("editWhen").value;
      if(!whenVal){ $("editMsg").textContent = "Please pick a date & time."; return; }
      const amountNum = $("editAmount").value!=="" ? Number($("editAmount").value) : null;
      const updates = {
        occurred_at: new Date(whenVal).toISOString(),
        intake_type: editType,
        description: $("editDescription").value.trim() || null,
        amount_oz: editType==="food" ? null : amountNum,
        amount_text: editType==="food" && $("editAmount").value!=="" ? $("editAmount").value + " oz" : null,
        logged_by: $("editLoggedBy").value.trim() || null
      };
      $("editSaveBtn").disabled = true; $("editSaveBtn").textContent = "Saving…";
      const { error } = await db.from("hydration_log").update(updates).eq("id", id);
      $("editSaveBtn").disabled = false; $("editSaveBtn").textContent = "Save changes ✓";
      if(error){ $("editMsg").textContent = "Couldn't save: " + error.message; return; }
      if(navigator.vibrate) navigator.vibrate(30);
      closeEdit();
      load();
    });

    $("refreshBtn").addEventListener("click", load);
    loadGoal();
    load();
    setInterval(()=>{ loadGoal(); if($("viewHistory").classList.contains("active")) load(); }, 30000);
  </script>
</body>
</html>
