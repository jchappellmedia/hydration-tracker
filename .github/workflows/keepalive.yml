name: Keep Supabase project awake

on:
  schedule:
    - cron: "0 12 */3 * *" # every 3 days at noon UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (auth + database)
        run: |
          KEY="sb_publishable_dfuSJkpp1yZy5yg4tlKsGw_ync0kLXy"
          URL="https://utupgcayrwocavdmhyle.supabase.co"
          curl -sf "$URL/auth/v1/health" -H "apikey: $KEY" && echo " auth ok"
          curl -sf "$URL/rest/v1/skillstack_state?select=user_id&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" && echo " rest ok"
