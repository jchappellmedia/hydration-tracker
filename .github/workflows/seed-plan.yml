name: Seed plan
# Writes a "My Plan" document into a user's own account row via the app's
# normal auth + REST API (row-level security enforced — a user can only
# ever write their own row). All personal values arrive as dispatch inputs
# and are only handled through env vars, so nothing sensitive is committed
# or printed to logs.
on:
  workflow_dispatch:
    inputs:
      account_email:
        description: Account email (used to sign in)
        required: true
      account_password:
        description: Account password (never echoed)
        required: true
      plan_b64:
        description: Base64-encoded plan JSON
        required: true

permissions: {}

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Seed plan into account
        env:
          ACCOUNT_EMAIL: ${{ inputs.account_email }}
          ACCOUNT_PASSWORD: ${{ inputs.account_password }}
          PLAN_B64: ${{ inputs.plan_b64 }}
        run: python3 scripts/seed_plan.py
